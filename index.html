<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sudoku — Jamk</title>
<style>
  :root{--page-bg:#EFE9DC;--ink:#221E18;--muted:#7a7264;--panel:#FBF7EE;--panel-border:#D8CFBD;--accent:#1B5FB0;
    --grid-strong:#2A2520;--grid-thin:#C3BAA8;--cell:#F4EFE3;--given:#1A1714;
    --teal:#0C6675;--magenta:#B5179E;--cage:#33302A;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--page-bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100%;padding:48px 16px 60px;}
  header{text-align:center;max-width:560px;margin-bottom:30px;}
  h1{margin:0 0 6px;font-size:34px;letter-spacing:.5px;}
  .sub{color:var(--muted);font-size:15px;line-height:1.5;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;width:100%;max-width:820px;}
  a.card{display:flex;flex-direction:column;gap:12px;text-decoration:none;color:inherit;
    background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:18px 18px 20px;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;}
  a.card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.12);border-color:var(--accent);}
  .thumb{width:100%;}
  .name{font-size:19px;font-weight:700;}
  .meta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-top:-4px;}
  .diff{font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:2px 8px;}
  .diff.easy{background:#3f8f4e;} .diff.medium{background:#c98a1e;} .diff.hard{background:#b3402a;}
  footer{margin-top:34px;color:var(--muted);font-size:12.5px;text-align:center;}

  /* shared mini-board */
  .b9{display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);
    width:100%;aspect-ratio:1;background:var(--grid-thin);border:2.5px solid var(--grid-strong);border-radius:4px;gap:.5px;}
  .b9 .c{position:relative;background:var(--cell);display:flex;align-items:center;justify-content:center;
    font-size:clamp(7px,1.7vw,12px);font-weight:700;color:var(--given);overflow:hidden;}
  .b9 .c.bl{box-shadow:inset 1.5px 0 0 0 var(--grid-strong);}
  .b9 .c.bt{box-shadow:inset 0 1.5px 0 0 var(--grid-strong);}
  .b9 .c.bl.bt{box-shadow:inset 1.5px 0 0 0 var(--grid-strong),inset 0 1.5px 0 0 var(--grid-strong);}
  .ov{position:absolute;inset:0;z-index:2;pointer-events:none;}        /* clone / cage perimeter overlay */
  .c .val{position:relative;z-index:3;}

  /* buddies mini with clue ring */
  .bud{display:grid;grid-template-columns:13% 1fr 13%;grid-template-rows:13% 1fr 13%;width:100%;aspect-ratio:1;}
  .bud-strip{display:grid;}
  .bud-strip.bt{grid-row:1;grid-column:2;grid-template-columns:repeat(9,1fr);}
  .bud-strip.bb{grid-row:3;grid-column:2;grid-template-columns:repeat(9,1fr);}
  .bud-strip.bl{grid-row:2;grid-column:1;grid-template-rows:repeat(9,1fr);}
  .bud-strip.br{grid-row:2;grid-column:3;grid-template-rows:repeat(9,1fr);}
  .bud-clue{display:flex;align-items:center;justify-content:center;font-size:clamp(5px,1.25vw,8px);font-weight:600;color:#6a6253;font-variant-numeric:tabular-nums;}
  .bud-board{grid-row:2;grid-column:2;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);
    background:var(--grid-thin);border:2px solid var(--grid-strong);border-radius:3px;gap:.5px;}
  .bud-board .c{position:relative;background:var(--cell);}
  .bud-board .c.bl{box-shadow:inset 1.2px 0 0 0 var(--grid-strong);}
  .bud-board .c.bt{box-shadow:inset 0 1.2px 0 0 var(--grid-strong);}
  .bud-board .c.bl.bt{box-shadow:inset 1.2px 0 0 0 var(--grid-strong),inset 0 1.2px 0 0 var(--grid-strong);}
</style>
</head>
<body>
<header>
  <h1>Puzzles</h1>
  <div class="sub">A small set of variant puzzles I've made</div>
</header>

<div class="grid">
  <a class="card" href="bubbles.html">
    <div class="thumb" data-mini="bubbles"></div>
    <div class="name">Bubbles</div>
    <div class="meta"><span class="diff easy">Easy</span> Sudoku variant</div>
  </a>
  <a class="card" href="negotiation.html">
    <div class="thumb" data-mini="negotiation"></div>
    <div class="name">Negotiation</div>
    <div class="meta"><span class="diff medium">Medium</span> Sudoku variant</div>
  </a>
  <a class="card" href="buddies.html">
    <div class="thumb" data-mini="buddies"></div>
    <div class="name">Buddies</div>
    <div class="meta"><span class="diff hard">Hard</span> Sudoku variant</div>
  </a>
</div>


<script>
(function(){
  const BUB_GIV="000020000000040000000608000008000100630000087004000200000204000000060000000090000";
  const BUB_GRP="..........000......000...11.000...11..............000......000.11...000.11.......";
  const NEG_GIV="567890000400000000300000000200000000100000000000000000000000147000000258000000369";
  const NEG_REG="000006677011166677011166777011186677028888455228888455223334455223334455223334445";
  const NEG_CAGE=".0.3.333.00.33333.00.......001......001........1........1...2...11.2.22.111.22222";
  const REGCOL=["#BCD4EE","#C2E3B0","#EFE59C","#F7C795","#F3C7C7","#DEC9ED","#AEE0D6","#E0D2B6","#D6D9DD"];
  const TOP=[1,1,15,25,9,4,9,0,30],BOTTOM=[22,5,5,20,4,0,19,7,32],LEFT=[3,5,3,4,33,5,8,17,14],RIGHT=[19,3,3,15,8,24,36,22,33];
  const RC=i=>[(i/9)|0,i%9];

  function baseGrid(host,cls){
    const g=document.createElement("div"); g.className=cls||"b9";
    const cells=[];
    for(let i=0;i<81;i++){const[r,c]=RC(i);const d=document.createElement("div");d.className="c";
      if(c%3===0&&c!==0)d.classList.add("bl"); if(r%3===0&&r!==0)d.classList.add("bt");
      g.appendChild(d);cells.push(d);}
    host.appendChild(g); return cells;
  }
  // draw a single-box perimeter outline for a group/cage on cell i
  function perim(cells,i,members,color,dashed){
    const[r,c]=RC(i), gid=members[i];
    const same=(rr,cc)=>rr>=0&&rr<9&&cc>=0&&cc<9&&members[rr*9+cc]===gid;
    const ov=document.createElement("div"); ov.className="ov";
    const ins=dashed?"10%":"0"; ov.style.inset=ins;
    const bd=(dashed?"1px dashed ":"1.4px solid ")+color;
    if(!same(r-1,c))ov.style.borderTop=bd; if(!same(r+1,c))ov.style.borderBottom=bd;
    if(!same(r,c-1))ov.style.borderLeft=bd; if(!same(r,c+1))ov.style.borderRight=bd;
    cells[i].appendChild(ov);
  }
  function digit(cell,ch){ if(ch&&ch!=="0"){const v=document.createElement("span");v.className="val";v.textContent=ch;cell.appendChild(v);} }

  function renderBubbles(host){
    const cells=baseGrid(host);
    const grp=[...BUB_GRP];
    for(let i=0;i<81;i++){
      if(grp[i]!=="."){ cells[i].style.background="#D6D0C4";
        perim(cells,i,grp,grp[i]==="0"?"var(--teal)":"var(--magenta)",false); }
      digit(cells[i],BUB_GIV[i]);
    }
  }
  function renderNegotiation(host){
    const cells=baseGrid(host);
    const cage=[...NEG_CAGE];
    for(let i=0;i<81;i++){
      cells[i].style.background=REGCOL[+NEG_REG[i]];
      if(cage[i]!==".") perim(cells,i,cage,"var(--cage)",true);
      digit(cells[i],NEG_GIV[i]);
    }
  }
  function renderBuddies(host){
    host.className="thumb bud";
    const mk=(cls,arr)=>{const s=document.createElement("div");s.className="bud-strip "+cls;
      arr.forEach(v=>{const d=document.createElement("div");d.className="bud-clue";d.textContent=v;s.appendChild(d);});host.appendChild(s);};
    mk("bt",TOP);mk("bb",BOTTOM);mk("bl",LEFT);mk("br",RIGHT);
    baseGrid(host,"bud-board");
  }

  document.querySelectorAll("[data-mini]").forEach(h=>{
    const t=h.dataset.mini;
    if(t==="bubbles")renderBubbles(h);
    else if(t==="negotiation")renderNegotiation(h);
    else if(t==="buddies")renderBuddies(h);
  });
})();
</script>
</body>
</html>
